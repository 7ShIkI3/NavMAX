services:
  redis:
    image: redis:7-alpine
    container_name: navmax-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  navmax-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navmax-api
    command: uvicorn navmax.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - NAVMAX_REDIS_URL=redis://redis:6379/0
      - NAVMAX_DB_URL=sqlite+aiosqlite:///data/navmax.db
    volumes:
      - .:/app
      - navmax_data:/root/.navmax
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  navmax-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navmax-worker
    command: celery -A navmax.tasks worker --loglevel=info --concurrency=4
    environment:
      - NAVMAX_REDIS_URL=redis://redis:6379/0
      - NAVMAX_DB_URL=sqlite+aiosqlite:///data/navmax.db
    volumes:
      - .:/app
      - navmax_data:/root/.navmax
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  navmax_data:
