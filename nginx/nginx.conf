# ═══════════════════════════════════════════════════════════════════
# NavMAX — Nginx Reverse Proxy Configuration
# Reverse-proxy vers l'API FastAPI (port 8000) avec rate limiting
# ═══════════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # ── MIME types ────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Formats de logs ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status"'
    '}';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Taille max des uploads ────────────────────────────────────
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # ── Timeouts ──────────────────────────────────────────────────
    proxy_connect_timeout   60s;
    proxy_send_timeout      120s;
    proxy_read_timeout      300s;
    send_timeout            60s;

    # ── Buffering ─────────────────────────────────────────────────
    proxy_buffering on;
    proxy_buffer_size   4k;
    proxy_buffers       8 32k;
    proxy_busy_buffers_size 64k;

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── Rate Limiting ─────────────────────────────────────────────
    # Limite : 10 req/s par IP (burst 20)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=${NGINX_RATE_LIMIT:-10}r/s;
    limit_req_status 429;

    # ── Upstream : API NavMAX ─────────────────────────────────────
    upstream navmax-api {
        server navmax-api:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ── Server ────────────────────────────────────────────────────
    server {
        listen       ${NGINX_PORT:-80} default_server;
        server_name  ${NGINX_SERVER_NAME:-localhost};

        # ── Sécurité des headers ─────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Health check (pas de rate limit) ─────────────────────
        location /api/v1/health {
            access_log off;
            proxy_pass http://navmax-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API (rate limité) ─────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://navmax-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Request-ID $request_id;

            # Cache négatif
            proxy_cache_bypass $http_cache_control;
            add_header X-Request-ID $request_id always;
        }

        # ── Documentation Swagger ─────────────────────────────────
        location /docs {
            proxy_pass http://navmax-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://navmax-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /redoc {
            proxy_pass http://navmax-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Fichiers statiques ────────────────────────────────────
        location /static/ {
            alias /app/navmax/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Dashboard (SPA) ──────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://navmax-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Pages d'erreur ────────────────────────────────────────
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type text/html;
            return 429 '<!DOCTYPE html><html><head><title>Too Many Requests</title></head><body><h1>429 — Trop de requêtes</h1><p>Vous avez dépassé la limite de requêtes. Veuillez ralentir.</p><hr><p>NavMAX API</p></body></html>';
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type text/html;
            return 502 '<!DOCTYPE html><html><head><title>Service Temporarily Unavailable</title></head><body><h1>502 — Service indisponible</h1><p>Le service est temporairement indisponible. Veuillez réessayer plus tard.</p></body></html>';
        }
    }
}
